<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Anchor</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('anchor_theme');
          var system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var theme = saved === 'auto' ? system : (saved || 'dark');
          document.documentElement.classList.add('theme-' + theme);
          
          // Apply initial colors if light to prevent flash before react fully starts up
          if (theme === 'light') {
            document.documentElement.style.setProperty('--color-bg', '#F5F5F7');
            document.documentElement.style.setProperty('--color-text', '#1A1A1A');
            document.documentElement.style.setProperty('--color-surface', '#FFFFFF');
            document.documentElement.style.setProperty('--color-surface2', '#F0F0F2');
            document.documentElement.style.setProperty('--color-border', 'rgba(0, 0, 0, 0.08)');
          }
        } catch (e) {
          console.warn('Theme flash prevention failed to apply.', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
